services:
  backend:
    build:
      context: ./backend
    container_name: ai-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./backend:/app       # Monta tu código en el contenedor
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ai-network

  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ai-network

volumes:
  n8n_data:

networks:
  ai-network:
    driver: bridge
