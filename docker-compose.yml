services:
  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - ai-network

  postgres:
    image: postgres:14
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"  # solo para desarrollo local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-network
  
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ai-network
    restart: unless-stopped




volumes:
  postgres_data:
  n8n_data:

networks:
  ai-network:
    driver: bridge
